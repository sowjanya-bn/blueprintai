<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Streamlit PyVis Component</title>
    <link rel="stylesheet" href="style.css" />
    <!-- try local copies first (place files into build/), fallback to CDN if not present -->
    <script src="./vis-network.min.js"></script>
    <script>
      // Load vis-network from CDN if local copy not present.
      (function(){
        if(typeof window.vis === 'undefined'){
          var s = document.createElement('script');
          s.src = 'https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js';
          document.head.appendChild(s);
        }
      })();
    </script>
    <script src="./streamlit_component_lib.js"></script>
    <script>
      // Fallback if local component lib is not available.
      (function(){
        if(typeof window.Streamlit === 'undefined'){
          var s = document.createElement('script');
          s.src = 'https://unpkg.com/streamlit-component-lib/dist/index.js';
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>
  <body>
    <div id="mynetwork" style="width:100%; height:600px; border:1px solid #ddd;"></div>
    <script src="index.js"></script>
  </body>
</html>
