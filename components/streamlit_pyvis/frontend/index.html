<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Streamlit PyVis Component</title>
    <link rel="stylesheet" href="style.css" />
    <!-- try local copies first (place files into build/), fallback to CDN if not present -->
    <script src="./vis-network.min.js"></script>
    <script src="./streamlit_component_lib.js"></script>
    <script>
      // if local files not loaded, dynamically load from CDN
      (function(){
        function existsGlobal(name){ return typeof window[name] !== 'undefined'; }
        if(!existsGlobal('vis')){
          var s = document.createElement('script');
          s.src = 'https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js';
          document.head.appendChild(s);
        }
        if(!existsGlobal('Streamlit')){
          var s2 = document.createElement('script');
          s2.src = 'https://unpkg.com/@streamlit/component-lib@1.5.0/dist/index.js';
          document.head.appendChild(s2);
        }
      })();
    </script>
  </head>
  <body>
    <div id="mynetwork" style="width:100%; height:600px; border:1px solid #ddd;"></div>
    <script src="index.js"></script>
  </body>
</html>
